<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOUNDER ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --panel: rgba(0, 0, 0, 0.72);
    --panel-solid: rgba(8, 8, 8, 0.92);
    --card: rgba(255, 255, 255, 0.04);
    --card-hover: rgba(255, 255, 255, 0.08);
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --text: #ECECEC;
    --text-dim: #999;
    --text-muted: #555;
    --gold: #F0B429;
    --red: #EF4444;
    --green: #22C55E;
    --blue: #3B82F6;
    --purple: #A78BFA;
    --cyan: #22D3EE;
    --orange: #FB923C;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #hud-root {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }
  #hud-root > * { pointer-events: auto; }

  /* Header */
  .header {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    height: 44px;
    background: var(--panel-solid);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 100;
  }
  .logo {
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; color: var(--text);
    white-space: nowrap;
  }
  .logo span { color: var(--text-muted); font-weight: 400; font-size: 9px; letter-spacing: 1.5px; }
  .header-status {
    margin-left: auto;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .header-status .dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 6px;
    background: var(--green);
  }
  .header-btn {
    padding: 5px 14px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.8px;
    background: var(--blue);
    color: #fff;
    border: none; border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .header-btn:hover { opacity: 0.85; }

  /* Panels */
  .panel-left {
    position: absolute;
    top: 64px; left: 10px; bottom: 10px;
    width: 260px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    padding: 12px;
  }
  .panel-right {
    position: absolute;
    top: 64px; right: 10px; bottom: 10px;
    width: 300px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    padding: 12px;
    display: none;
  }
  .panel-right.visible { display: block; }
  .panel-bottom {
    position: absolute;
    bottom: 10px; left: 280px; right: 320px;
    height: 180px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-y: auto;
    padding: 12px;
  }
  .panel-title {
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Ranking item */
  .rank-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }
  .rank-item:hover { background: var(--card-hover); }
  .rank-item.selected { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }
  .rank-item.dead { opacity: 0.4; }
  .rank-pos { font-size: 11px; font-weight: 700; color: var(--text-muted); width: 18px; text-align: center; }
  .rank-color { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-meta { font-size: 9px; color: var(--text-dim); }
  .rank-val { font-size: 11px; font-weight: 600; color: var(--gold); text-align: right; }

  /* Mini bars */
  .mini-bars { display: flex; gap: 3px; margin-top: 4px; }
  .mini-bar { height: 3px; border-radius: 2px; flex: 1; background: rgba(255,255,255,0.06); overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* Timeline */
  .timeline-entry {
    padding: 6px 8px;
    font-size: 10px;
    color: var(--text-dim);
    border-left: 2px solid var(--border);
    margin-left: 4px;
    margin-bottom: 4px;
  }
  .timeline-entry .turn-label {
    font-size: 9px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 1px;
  }
  .timeline-entry .action-text { color: var(--text); }

  /* Detail panel */
  .detail-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .detail-avatar {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff;
  }
  .detail-name { font-size: 14px; font-weight: 700; }
  .detail-sector { font-size: 10px; color: var(--text-dim); }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-bottom: 14px;
  }
  .stat-cell {
    background: var(--card);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .stat-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 14px; font-weight: 700; margin-top: 2px; }
  .team-member {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
    font-size: 10px;
  }
  .team-role { font-size: 9px; color: var(--text-dim); text-transform: capitalize; }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--panel-solid);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 28px;
    min-width: 380px;
    max-width: 500px;
  }
  .modal h2 {
    font-size: 16px; font-weight: 700;
    margin-bottom: 18px;
  }
  .modal label {
    display: block; font-size: 10px; font-weight: 500;
    color: var(--text-dim); letter-spacing: 0.8px;
    margin-bottom: 4px; margin-top: 12px;
  }
  .modal input, .modal select {
    width: 100%; padding: 8px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text); font-size: 12px;
    font-family: inherit;
  }
  .modal-actions {
    display: flex; gap: 10px;
    margin-top: 20px;
  }
  .modal-actions button {
    flex: 1; padding: 10px;
    border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-dim); }

  /* Lobby */
  .lobby-list {
    margin: 14px 0;
  }
  .lobby-agent {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--card);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 11px;
  }
  .lobby-agent .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="hud-root"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
