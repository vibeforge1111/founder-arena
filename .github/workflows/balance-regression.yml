name: Balance Regression

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  seeded-balance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression tests
        run: python -m pytest tests/test_balance_harness.py tests/test_example_agent.py tests/test_rich_state_integration.py -q

      - name: Run seeded balance harness
        run: >
          python balance_harness.py
          --seed-count 10
          --agents 4
          --turns 52
          --json-out data/balance-summary.json
          --max-winner-divergence-rate 0.35
          --max-avg-rank-delta 0.65
          --max-worst-archetype-avg-placement 3.05
          --max-best-archetype-win-rate 0.50
          --max-best-sector-win-rate 0.50
          --max-best-archetype-score-bias 0.35
          --max-best-archetype-family-share-gap 0.20
          --max-best-archetype-healthy-stabilization-gap 0.30
          --max-best-archetype-pressured-stabilization-gap 0.15
          --max-best-archetype-pressured-commercial-deficit 0.18

      - name: Upload balance summary
        uses: actions/upload-artifact@v4
        with:
          name: balance-summary
          path: data/balance-summary.json
