<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOUNDER ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Game-inspired palette */
    --panel: rgba(22, 27, 34, 0.92);
    --panel-solid: rgba(30, 35, 44, 0.96);
    --panel-light: rgba(38, 44, 56, 0.9);
    --card: rgba(255, 255, 255, 0.06);
    --card-hover: rgba(255, 255, 255, 0.1);
    --border: rgba(255, 255, 255, 0.08);
    --border-bright: rgba(255, 255, 255, 0.16);
    --text: #F0F2F5;
    --text-dim: #B8BCC8;
    --text-muted: #6B7280;
    --gold: #FFB800;
    --red: #EF4444;
    --green: #34D058;
    --blue: #4A9EFF;
    --purple: #A78BFA;
    --cyan: #22D3EE;
    --orange: #FB923C;
    --neon-green: #4AFF6F;
    --neon-blue: #00D4FF;
    --neon-purple: #B44AFF;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --glow-sm: 0 0 8px rgba(74,158,255,0.3);
    --glow-green: 0 0 14px rgba(52,208,88,0.4);
    --glow-gold: 0 0 12px rgba(255,184,0,0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0e;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #hud-root {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }
  #hud-root > * { pointer-events: auto; }

  /* Header - frosted glass gaming bar */
  .header {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    height: 52px;
    background: linear-gradient(180deg, rgba(25,30,40,0.94) 0%, rgba(18,22,30,0.96) 100%);
    backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .logo-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: linear-gradient(135deg, #4A9EFF 0%, #2563EB 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; color: #fff;
    box-shadow: 0 2px 8px rgba(74,158,255,0.3);
    letter-spacing: 0;
  }
  .logo-text {
    font-size: 13px; font-weight: 800;
    letter-spacing: 2.5px; color: #fff;
  }
  .logo-text span {
    display: block;
    color: var(--text-muted); font-weight: 500; font-size: 8px;
    letter-spacing: 1.5px; margin-top: -1px;
  }
  .header-status {
    margin-left: auto;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.5px;
    font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.04);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .header-status .dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(52,208,88,0.6);
    animation: dotPulse 2s ease-in-out infinite;
  }
  .match-strip {
    position: absolute;
    top: 72px; left: 290px; right: 330px;
    min-height: 74px;
    display: grid;
    grid-template-columns: 1.05fr 1.2fr 1.2fr;
    gap: 10px;
    z-index: 90;
  }
  .match-strip.match-strip-with-entry {
    top: 146px;
  }
  .match-strip.match-strip-with-replay-entry {
    top: 244px;
  }
  .match-strip.hidden { display: none; }
  .spectator-entry {
    position: absolute;
    top: 72px; left: 290px; right: 330px;
    min-height: 62px;
    z-index: 92;
  }
  .spectator-entry.hidden { display: none; }
  .spectator-entry-card {
    background: linear-gradient(180deg, rgba(18,26,36,0.94) 0%, rgba(12,18,28,0.96) 100%);
    backdrop-filter: blur(18px) saturate(1.25);
    border: 1px solid rgba(34,211,238,0.16);
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.35), inset 0 0 22px rgba(34,211,238,0.04);
  }
  .spectator-entry-card-replay {
    border-color: rgba(255,184,0,0.16);
    box-shadow: 0 12px 30px rgba(0,0,0,0.38), inset 0 0 24px rgba(255,184,0,0.04);
  }
  .spectator-entry-topline {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .spectator-entry-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(34,211,238,0.12);
    border: 1px solid rgba(34,211,238,0.22);
    color: var(--cyan);
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .spectator-entry-meta {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
  }
  .spectator-entry-headline {
    font-size: 12px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.45;
    margin-top: 8px;
  }
  .spectator-entry-subline {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .spectator-entry-hero {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-top: 8px;
  }
  .spectator-entry-scorecard {
    min-width: 128px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,184,0,0.08);
    border: 1px solid rgba(255,184,0,0.14);
    text-align: right;
  }
  .spectator-entry-score {
    font-size: 14px;
    font-weight: 900;
    color: var(--gold);
  }
  .spectator-entry-score-meta {
    font-size: 8px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .spectator-entry-summary-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .spectator-entry-summary-cell {
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 0;
  }
  .spectator-entry-cell-label {
    font-size: 8px;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .spectator-entry-cell-value {
    font-size: 11px;
    color: var(--text);
    font-weight: 800;
    line-height: 1.45;
    margin-top: 6px;
  }
  .spectator-entry-cell-wrap {
    font-size: 10px;
    font-weight: 700;
  }
  .spectator-entry-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .spectator-entry-action {
    flex: 1 1 120px;
  }
  .match-strip-card {
    background: linear-gradient(180deg, rgba(22,27,36,0.9) 0%, rgba(14,18,26,0.94) 100%);
    backdrop-filter: blur(18px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .match-strip-card.emphasis {
    border-color: rgba(255,184,0,0.16);
    box-shadow: 0 8px 24px rgba(0,0,0,0.32), inset 0 0 18px rgba(255,184,0,0.05);
  }
  .match-strip-label {
    font-size: 8px;
    font-weight: 800;
    color: var(--text-muted);
    letter-spacing: 1.1px;
    text-transform: uppercase;
  }
  .match-strip-score {
    font-size: 16px;
    font-weight: 900;
    color: var(--text);
    margin-top: 4px;
  }
  .match-strip-body {
    font-size: 10px;
    line-height: 1.45;
    color: var(--text);
    margin-top: 6px;
  }
  .match-strip-sub {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Button Tiers ── */

  /* Tier 1: Chunky 3D Game CTA (like "Join Now" from Clash) */
  .btn-game {
    padding: 8px 22px;
    font-size: 11px; font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .btn-game-green {
    background: linear-gradient(180deg, #4ADE80 0%, #22C55E 40%, #16A34A 100%);
    border-bottom: 4px solid #15803d;
    box-shadow: 0 4px 14px rgba(34,197,94,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-game-green:hover {
    box-shadow: 0 4px 16px rgba(34,197,94,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    filter: brightness(1.08);
  }
  .btn-game-green:active {
    transform: translateY(3px);
    border-bottom-width: 0px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    background: linear-gradient(180deg, #16A34A 0%, #15803d 40%, #166534 100%);
  }
  .btn-game-blue {
    background: linear-gradient(180deg, #60A5FA 0%, #3B82F6 40%, #2563EB 100%);
    border-bottom: 4px solid #1d4ed8;
    box-shadow: 0 4px 14px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-game-blue:hover {
    box-shadow: 0 4px 16px rgba(59,130,246,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    filter: brightness(1.08);
  }
  .btn-game-blue:active {
    transform: translateY(3px);
    border-bottom-width: 0px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    background: linear-gradient(180deg, #2563EB 0%, #1d4ed8 40%, #1e40af 100%);
  }
  .btn-game-gold {
    background: linear-gradient(180deg, #FBBF24 0%, #F59E0B 40%, #D97706 100%);
    border-bottom: 4px solid #b45309;
    box-shadow: 0 4px 14px rgba(245,158,11,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    color: #1a1a2e;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-game-gold:hover {
    box-shadow: 0 4px 16px rgba(245,158,11,0.45), inset 0 1px 0 rgba(255,255,255,0.35);
    filter: brightness(1.08);
  }
  .btn-game-gold:active {
    transform: translateY(3px);
    border-bottom-width: 0px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    background: linear-gradient(180deg, #D97706 0%, #b45309 40%, #92400e 100%);
  }
  .btn-game-purple {
    background: linear-gradient(180deg, #C4B5FD 0%, #A78BFA 40%, #7C3AED 100%);
    border-bottom: 4px solid #5b21b6;
    box-shadow: 0 4px 14px rgba(167,139,250,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-game-purple:hover {
    box-shadow: 0 4px 16px rgba(167,139,250,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    filter: brightness(1.08);
  }
  .btn-game-purple:active {
    transform: translateY(3px);
    border-bottom-width: 0px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
    background: linear-gradient(180deg, #7C3AED 0%, #5b21b6 40%, #4c1d95 100%);
  }
  .btn-game::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 50%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s ease;
  }
  .btn-game:hover::before { left: 100%; }
  .btn-game:disabled {
    opacity: 0.5; cursor: not-allowed;
    transform: none !important;
  }

  /* Tier 2: Clean secondary button */
  .btn-clean {
    padding: 7px 18px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-clean:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.18);
    filter: brightness(1.1);
  }
  .btn-clean:active {
    transform: translateY(2px);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
    filter: brightness(0.95);
  }

  /* Tier 3: Ghost/link button */
  .btn-ghost {
    padding: 7px 14px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-ghost:hover {
    color: var(--text);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1);
  }

  /* Legacy header-btn kept for compat */
  .header-btn {
    padding: 7px 18px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .header-btn:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }
  .header-btn:active { transform: translateY(0px); }

  /* Panels - dark frosted glass */
  .panel-left {
    position: absolute;
    top: 72px; left: 10px; bottom: 10px;
    width: 270px;
    background: linear-gradient(180deg, rgba(22,27,36,0.92) 0%, rgba(16,20,28,0.95) 100%);
    backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    overflow-y: auto;
    padding: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .panel-right {
    position: absolute;
    top: 72px; right: 10px; bottom: 10px;
    width: 310px;
    background: linear-gradient(180deg, rgba(22,27,36,0.92) 0%, rgba(16,20,28,0.95) 100%);
    backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    overflow-y: auto;
    padding: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .panel-right.visible { display: block; }
  .panel-bottom {
    position: absolute;
    bottom: 10px; left: 290px; right: 330px;
    height: 210px;
    background: linear-gradient(180deg, rgba(22,27,36,0.92) 0%, rgba(16,20,28,0.95) 100%);
    backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .panel-title {
    font-size: 9px; font-weight: 700;
    letter-spacing: 2.5px; color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 8px;
  }

  /* Ranking item - game card style */
  .rank-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 3px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.02);
  }
  .rank-item:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.08);
    transform: translateX(2px);
  }
  .rank-item.selected {
    background: rgba(74,158,255,0.1);
    border: 1px solid rgba(74,158,255,0.3);
    box-shadow: inset 0 0 16px rgba(74,158,255,0.06), 0 0 12px rgba(74,158,255,0.08);
  }
  .rank-item-danger { border-color: rgba(239,68,68,0.12); }
  .rank-item-warning { border-color: rgba(251,146,60,0.12); }
  .rank-item-positive { border-color: rgba(52,208,88,0.12); }
  .rank-item.dead { opacity: 0.3; filter: grayscale(0.5); }
  .rank-pos {
    font-size: 12px; font-weight: 800; color: var(--text-muted);
    width: 22px; text-align: center;
  }
  .rank-item:first-child .rank-pos { color: var(--gold); text-shadow: 0 0 8px rgba(255,184,0,0.4); }
  .rank-avatar {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .rank-color { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; box-shadow: 0 0 4px currentColor; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-topline { display: flex; align-items: center; gap: 8px; }
  .rank-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-meta { font-size: 9px; color: var(--text-muted); margin-top: 1px; }
  .rank-val { font-size: 12px; font-weight: 800; color: var(--gold); text-align: right; text-shadow: 0 0 8px rgba(255,184,0,0.15); }
  .metric-delta {
    margin-left: auto;
    font-size: 8px;
    font-weight: 800;
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    border-radius: 999px;
    padding: 2px 7px;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .metric-delta.up {
    color: var(--green);
    border-color: rgba(52,208,88,0.18);
    background: rgba(52,208,88,0.08);
  }
  .metric-delta.down {
    color: var(--red);
    border-color: rgba(239,68,68,0.18);
    background: rgba(239,68,68,0.08);
  }
  .signal-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .signal-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.45px;
    border-radius: 999px;
    padding: 3px 7px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
  }
  .signal-pill-danger {
    color: #FCA5A5;
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.2);
  }
  .signal-pill-warning {
    color: #FCD34D;
    background: rgba(251,146,60,0.1);
    border-color: rgba(251,146,60,0.2);
  }
  .signal-pill-positive {
    color: #86EFAC;
    background: rgba(52,208,88,0.1);
    border-color: rgba(52,208,88,0.2);
  }
  .signal-pill-neutral {
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1);
  }

  /* Mini bars */
  .mini-bars { display: flex; gap: 3px; margin-top: 4px; }
  .mini-bar {
    height: 3px; border-radius: 2px; flex: 1;
    background: rgba(255,255,255,0.08); overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%; border-radius: 2px; transition: width 0.4s;
    box-shadow: 0 0 4px currentColor;
  }

  /* Bottom dashboard - gaming sections */
  .panel-bottom {
    display: flex;
    gap: 0;
    padding: 0;
    overflow: hidden;
    /* Reset absolute positioning when inside wrapper */
    position: relative !important;
    left: auto !important;
    right: auto !important;
    bottom: auto !important;
    height: auto !important;
    min-height: 180px;
  }
  .dash-section {
